name: data8
# This is the standard conda configuration file. Use this file to list
# the conda packages that you need installed in your environment.
channels:
  - conda-forge

dependencies:
  # Items required for basic level functionality
  - jupyter-collaboration==4.2.1

  # data8
  - attrs==25.4.0
  # [DH-603] Install datascience package from conda forge 
  - folium==0.20.0
  - ipykernel==6.31.0
  - ipympl==0.9.8
  - ipywidgets==8.1.7
  - jupyter-syncthing-proxy==1.0.3
  - nbclassic==1.3.3
  - syncthing==2.0.14
  - traitlets=5.14.3

  # Items not in conda forge
  - pip:
    - jupyter-tree-download==1.0.1
  # https://github.com/berkeley-dsep-infra/datahub/issues/7669
    - jupytutor==0.3.0
  # Export notebooks as PDFs with Chrome
    - nb2pdf==0.6.2
    - nbpdfexport==0.2.1
  # [DH-418] okpy 1.18.1 is not compatibile with otter-grader 6.0.4 because they require conflicting versions of requests
  #  - okpy==1.18.1
    - git+https://github.com/shaneknapp/python-popularity-contest.git@add-error-handling
